name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write       # create the GitHub release
  id-token: write       # required for build provenance attestation
  attestations: write   # write the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Attest build provenance for main.js
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: main.js

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" main.js manifest.json styles.css \
            --title "$TAG" \
            --notes "Fast 3D Graph $TAG. Built and attested by GitHub Actions. See README for details."
